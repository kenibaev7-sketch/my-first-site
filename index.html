<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Обо мне</title>
    <link rel="stylesheet" href="style.css">

<body>

<section class="quote-box">

    <button id="new-quote-btn">Новая цитата</button>

<script src="script.js" defer></script>
